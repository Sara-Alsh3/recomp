<style>
:root{
  --paper:#FDF3F7; --card:#FFFFFF; --ink:#2B1A22; --muted:#9E8791; --faint:#CBB2BD;
  --line:#F4E4EC; --line2:#FAEFF4;
  --train:#E5356E; --rest:#B14A7A; --pro:#E8963A;
  --train-s:#FCE1EC; --rest-s:#F5E2EC; --pro-s:#FBEBD6;
  --carb:#2FA37A; --carb-s:#DEF1E9; --sugar:#DB5A3C; --sugar-s:#FBE6DE;
  --water:#3FA3DF; --water-s:#E3F1FB;
  --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
#app{height:100%;display:flex;flex-direction:column}

/* scroll region */
.scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(var(--sat) + 8px) 18px calc(var(--sab) + 92px);
}
.scroll::-webkit-scrollbar{display:none}

/* large title header */
.lt{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;letter-spacing:-.03em;
  font-size:34px;line-height:1.02;margin:8px 0 2px}
.lt-sub{color:var(--muted);font-size:14px;margin-bottom:20px}
.swap{color:var(--train);font-weight:600;cursor:pointer;margin-left:4px;font-size:13px}
.swap::before{content:"· "}

/* section label */
.slabel{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin:26px 4px 10px}

/* ===== cards ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.pad{padding:16px 18px}

/* progress ring */
.ring-wrap{display:flex;align-items:center;gap:16px}
.ring{position:relative;width:66px;height:66px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring-num{position:absolute;inset:0;display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:17px}
.ring-txt .t1{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px}
.ring-txt .t2{color:var(--muted);font-size:13px;margin-top:2px}

/* workout chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;margin:0 -18px;padding-left:18px;padding-right:18px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--line);background:var(--card);border-radius:99px;
  padding:9px 15px;font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;transition:.15s}
.chip[data-type="train"].on{background:var(--train);border-color:var(--train);color:#fff}
.chip[data-type="rest"].on{background:var(--rest);border-color:var(--rest);color:#fff}
.chip:active{transform:scale(.95)}

/* exercise rows */
.exlist{margin-top:14px}
.exrow{display:block;padding:11px 6px;border-top:1px solid var(--line2)}
.exrow:first-child{border-top:none}
.exrow-top{display:flex;align-items:center;gap:13px;cursor:pointer;border-radius:11px;padding:2px}
.exrow-top:active{background:var(--paper)}
.thumb{width:52px;height:40px;flex:none;background:var(--line2);border-radius:11px;overflow:hidden;display:grid;place-items:center}
.thumb svg.fig{width:100%;height:100%}
.exmid{flex:1;min-width:0}
.exname{font-size:15px;font-weight:600;line-height:1.2}
.exsets{font-size:12.5px;color:var(--muted);margin-top:2px}
.exrow.on .exname{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--line)}
.box{width:26px;height:26px;flex:none;border-radius:8px;border:2px solid var(--line);display:grid;place-items:center;transition:.15s;background:#fff}
.box svg{width:14px;height:14px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.4);transition:.16s}
.exrow.on .box{border-color:transparent}
.exrow.on .box svg{opacity:1;transform:scale(1)}
.exrow.train.on .box{background:var(--train)}
.exrow.rest.on .box{background:var(--rest)}
.exrow.warm.on .box{background:var(--pro)}
.wemoji{width:38px;text-align:center;font-size:22px;flex:none}
.wwatch{margin-left:auto;font-size:12px;font-weight:700;color:var(--train);background:var(--train-s);padding:5px 10px;border-radius:99px;text-decoration:none;white-space:nowrap;flex:none}
.wwatch:active{opacity:.7}
.setboxes{display:flex;gap:8px;margin:10px 0 2px 66px;flex-wrap:wrap}
.setboxes.detail{margin:2px 0 0 0;justify-content:flex-start}
.setnote{font-size:12.5px;color:var(--muted);margin-top:13px}
.exprog{font-family:"Bricolage Grotesque";font-weight:800;font-size:12px;color:var(--muted);background:var(--line2);padding:4px 9px;border-radius:99px;white-space:nowrap}
.exdone{width:28px;height:28px;border-radius:9px;background:var(--train);display:grid;place-items:center;flex:none}
.exdone svg{width:15px;height:15px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.mctrls{display:flex;gap:8px;margin-top:14px}
.mctrls .bkbtn{flex:1}
.setbox{width:40px;height:40px;border-radius:10px;border:2px solid var(--line);display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--faint);cursor:pointer;background:#fff;transition:transform .1s, background .12s;touch-action:manipulation}
.setbox.on{background:var(--train);border-color:var(--train);color:#fff}
.setbox:active{transform:scale(.88)}
.exok{margin-left:auto;color:var(--rest);font-weight:800;font-size:17px}
button,.setbox,.food,.tog,.segbtn,.bkbtn,.chip,.exrow-top,.tab,.wk,.back,.swap,.demo,.freset{touch-action:manipulation}

/* protein / walk special rows */
.tog{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:16px;margin-top:12px;cursor:pointer;border:1px solid transparent}
.tog .box{width:26px;height:26px}
.tog-pro{background:var(--pro-s);border-color:#F0DCB4}
.tog-pro .box{border-color:#E4C486}
.tog-pro.on .box{background:var(--pro);border-color:transparent}
.tog-walk{background:var(--rest-s);border-color:#C9E7E0}
.tog-walk .box{border-color:#A9D6CC}
.tog-walk.on .box{background:var(--rest);border-color:transparent}
.tog-water{background:var(--water-s);border-color:#BFE1F5}
.tog-water .box{border-color:#9FD1EE}
.tog-water.on .box{background:var(--water);border-color:transparent}
.tog-water .tname{color:#0b5573}
.tog-water .tset{color:var(--water)}
.wbar{height:6px;border-radius:99px;background:#cfe7f7;overflow:hidden;margin-top:8px}
.wfill{height:100%;background:var(--water);border-radius:99px;transition:width .35s}
.tog .tname{font-size:14.5px;font-weight:700}
.tog-pro .tname{color:#8a5a12}
.tog-walk .tname{color:#0b5c50}
.tog .tsub{font-size:12px;color:var(--muted);margin-top:1px;font-weight:500}
.tog .tset{margin-left:auto;font-size:13px;font-weight:700}
.tog-pro .tset{color:#b8862f}
.tog-walk .tset{color:var(--rest)}

/* week list */
.wk{display:flex;align-items:center;gap:14px;padding:15px 16px;border-top:1px solid var(--line2);cursor:pointer}
.wk:first-child{border-top:none}
.wk-tab{width:5px;align-self:stretch;border-radius:99px;flex:none}
.wk-tab.train{background:var(--train)} .wk-tab.rest{background:var(--rest)}
.wk-n{font-family:"Bricolage Grotesque";font-weight:800;font-size:15px;width:20px;color:var(--faint)}
.wk-mid{flex:1}
.wk-t{font-size:15.5px;font-weight:600}
.wk-s{font-size:12.5px;color:var(--muted);margin-top:1px}
.chev{color:var(--faint);font-size:20px}

/* detail / moves */
.dhead{display:flex;align-items:center;gap:6px;margin:4px 0 2px}
.back{display:inline-flex;align-items:center;gap:3px;color:var(--train);font-weight:600;font-size:16px;cursor:pointer;padding:6px 4px;margin-left:-4px}
.big-fig{background:var(--line2);border-radius:18px;height:150px;display:grid;place-items:center;margin:10px 0 4px}
.big-fig svg.fig{width:74%;height:74%}
.cue{display:flex;gap:9px;font-size:14px;padding:6px 2px;color:#3a3d49}
.cue b{color:var(--train);font-weight:800}
.demo{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;
  background:var(--ink);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none}
.demo:active{opacity:.85}
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--train);background:var(--train-s);padding:4px 9px;border-radius:99px}

/* history */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 12px;text-align:center}
.stat .n{font-family:"Bricolage Grotesque";font-weight:800;font-size:26px;line-height:1}
.stat .l{font-size:11px;color:var(--muted);margin-top:5px;font-weight:600}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:4px}
.cal .dow{font-size:10px;color:var(--faint);text-align:center;font-weight:700;padding-bottom:2px}
.cell{aspect-ratio:1;border-radius:9px;background:var(--line2);display:grid;place-items:center;font-size:11px;color:var(--faint);position:relative}
.cell.has{background:var(--train-s);color:var(--train);font-weight:700}
.cell.full{background:var(--train);color:#fff}
.cell.today{outline:2px solid var(--ink);outline-offset:-2px}
.cell.blank{background:transparent}
.hrow{display:flex;align-items:center;gap:12px;padding:13px 4px;border-top:1px solid var(--line2)}
.hrow:first-child{border-top:none}
.hdot{width:9px;height:9px;border-radius:99px;flex:none}
.hmid{flex:1}
.hd-t{font-size:14.5px;font-weight:600}
.hd-s{font-size:12px;color:var(--muted);margin-top:1px}
.hpct{font-family:"Bricolage Grotesque";font-weight:800;font-size:15px}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.6}

/* fuel */
.fuel-tot{display:flex;align-items:baseline;gap:8px}
.fuel-g{font-family:"Bricolage Grotesque";font-weight:800;font-size:42px;line-height:1;color:var(--pro)}
.fuel-goal{color:var(--muted);font-size:14px;font-weight:600}
.fgoalhit{color:var(--rest);font-weight:700}
.fbar{height:10px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:12px}
.ffill{height:100%;background:linear-gradient(90deg,var(--pro),#F2C071);border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.fhint{display:flex;justify-content:space-between;align-items:center;margin:16px 4px 10px}
.fhint span{font-size:12.5px;color:var(--muted);font-weight:600}
.freset{border:1px solid var(--line);background:var(--card);color:var(--muted);font-weight:600;font-size:12px;border-radius:99px;padding:6px 13px;cursor:pointer}
.freset:active{background:var(--line2)}
.foodgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.food{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.12s}
.food:active{transform:scale(.96);background:var(--pro-s);border-color:#F0DCB4}
.food .fn{font-size:13.5px;font-weight:600;line-height:1.15}
.food .fs{font-size:11px;color:var(--muted);margin-top:1px}
.food .fg{margin-left:auto;font-family:"Bricolage Grotesque";font-weight:800;font-size:13px;color:var(--pro);white-space:nowrap}
.meal{display:flex;gap:12px;padding:13px 4px;border-top:1px solid var(--line2)}
.meal:first-child{border-top:none}
.meal .mt{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--pro);width:70px;flex:none;padding-top:2px}
.meal .mb{flex:1;font-size:14px;line-height:1.35}
.meal .mg{font-family:"Bricolage Grotesque";font-weight:800;font-size:13px;color:var(--muted);white-space:nowrap}
.macro{padding:12px 0;border-top:1px solid var(--line2)}
.macro:first-child{border-top:none;padding-top:2px}
.macro-top{display:flex;justify-content:space-between;align-items:baseline}
.macro-name{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px}
.macro-val{font-family:"Bricolage Grotesque";font-weight:800;font-size:18px}
.macro-val small{font-weight:600;font-size:12px;color:var(--muted)}
.mbar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin:8px 0 5px}
.mfill{height:100%;border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.macro-note{font-size:11.5px;color:var(--muted)}
.macro-note.over{color:var(--sugar);font-weight:600}
.foodcat{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:22px 4px 9px}

/* fuel segmented control */
.seg{display:flex;background:var(--line2);border-radius:13px;padding:4px;gap:4px;margin:4px 0 16px}
.segbtn{flex:1;text-align:center;padding:10px 4px;border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.segbtn.on{background:var(--card);color:var(--ink);box-shadow:0 1px 5px rgba(43,26,34,.08)}

/* status banner (celebrate / sad / neutral) */
.status{display:flex;gap:11px;align-items:center;padding:13px 14px;border-radius:14px;margin-top:13px}
.status.happy{background:var(--rest-s)}
.status.sad{background:var(--sugar-s)}
.status.neutral{background:var(--pro-s)}
.status-emoji{font-size:27px;line-height:1;flex:none}
.status.happy .status-emoji{animation:bob 1.1s ease-in-out infinite}
.status.sad .status-emoji{animation:tilt 1.6s ease-in-out infinite}
.status-text{font-size:13px;font-weight:600;line-height:1.35}
.status.happy .status-text{color:#0b5c50}
.status.sad .status-text{color:#a23f22}
.status.neutral .status-text{color:#8a5a12}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes tilt{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

/* big celebration card (day complete) */
.celebrate{position:relative;background:linear-gradient(135deg,var(--train-s),var(--pro-s));border:1px solid #F3D0DE;border-radius:18px;padding:20px 18px;text-align:center;margin-bottom:14px;overflow:hidden}
.celebrate-emoji{font-size:46px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
.celebrate-text{font-size:14px;font-weight:700;color:#8a2f4f;margin-top:6px;line-height:1.4}
@keyframes pop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.2) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
.confetti{position:absolute;top:-12px;width:8px;height:8px;border-radius:2px;opacity:.9;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(220px) rotate(360deg)}}

/* goal reminder */
.goalnote{display:flex;align-items:center;gap:8px;background:var(--train-s);border:1px solid #F6D3DE;border-radius:13px;padding:11px 14px;font-size:13px;font-weight:600;color:#7d2340;margin-bottom:16px}

/* backup / restore */
.backup-row{display:flex;gap:10px}
.bkbtn{flex:1;text-align:center;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:600;font-size:13.5px;border-radius:12px;padding:12px 8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.bkbtn:active{transform:scale(.97)}
.bkbtn.primary{background:var(--train);border-color:var(--train);color:#fff}
.water-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.water-btns .bkbtn{flex:1;min-width:96px;font-size:13px}
.water-weight{margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.7}
.water-weight input{width:56px;border:1px solid var(--line);border-radius:8px;padding:5px 6px;font-size:14px;text-align:center;font-weight:700;color:var(--ink)}
.water-weight b{color:var(--water)}

/* tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;
  padding:8px 8px calc(var(--sab) + 8px);
  background:rgba(253,243,247,.86);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--line)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--faint)}
.tab svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab .lab{font-size:10.5px;font-weight:600;letter-spacing:.01em}
.tab.on{color:var(--train)}

/* shared figure styling */
svg.fig .fl{stroke:var(--faint);stroke-width:2.4;opacity:.5;stroke-linecap:round}
svg.fig .b{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;opacity:.82}
svg.fig .h{fill:var(--ink);opacity:.82}
svg.fig .w{fill:var(--ink);opacity:.9}
svg.fig .a{fill:none;stroke:var(--train);stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round}

.hide{display:none !important}
</style>

function setCount(exId){ const m=EX[exId].s.match(/\d+/); return m?Math.min(6,parseInt(m[0])):1; }
function getSetArr(e,exId){
 const n=setCount(exId); const v=e.checks?e.checks[exId]:undefined;
 if(Array.isArray(v)){ const a=v.slice(0,n); while(a.length<n)a.push(false); return a; }
 if(v===true) return Array(n).fill(true);

}
function exDone(e,exId){ return getSetArr(e,exId).every(Boolean); }

/* ---------- storage (works inside Claude via window.storage, or on your phone via localStorage) ---------- */
const KEY="recomp-app-v1";
const store={
 async get(){
   if(window.storage&&window.storage.get){try{const r=await window.storage.get(KEY);return r?JSON.parse(r.value):null;}catch(e){return null;}}
   try{const v=localStorage.getItem(KEY);return v?JSON.parse(v):null;}catch(e){return null;}
 },
 async set(o){
   const s=JSON.stringify(o);
   if(window.storage&&window.storage.set){try{await window.storage.set(KEY,s);return;}catch(e){}}
   try{localStorage.setItem(KEY,s);}catch(e){}
 }
};

/* ---------- state ---------- */

// Sun→Lower, Mon→Back, Tue→Rest/Walk, Wed→Core, Thu→Full body, Fri→Walk, Sat→Full rest
const PLAN={0:"d1",1:"d2",2:"d3",3:"d4",4:"d5",5:"d6",6:"d7"};
function plannedWorkout(k){return PLAN[new Date(k+"T00:00:00").getDay()];}

const dkey=(d=new Date())=>{const z=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;};
const TODAY=dkey();
function entry(k){if(!state.log[k])state.log[k]={workout:null,checks:{},protein:false,walk:false};return state.log[k];}
async function persist(){await store.set(state);}

/* ---------- progress helpers ---------- */
function dayCompletion(k){
 const e=state.log[k];if(!e||!e.workout)return{done:0,total:0,pct:0};
 const d=dayById(e.workout);if(!d)return{done:0,total:0,pct:0};
 let items=[];
 if(d.type==="train"){
   warmupFor(d.id).forEach((w,i)=>items.push(!!(e.warm&&e.warm[i])));
   d.ex.forEach(x=>items.push(exDone(e,x)));
   items.push(!!e.protein);
 }
 else{if(d.id!=="d7")items.push(!!e.walk);items.push(!!e.protein);}
 const done=items.filter(Boolean).length,total=items.length;
 return{done,total,pct:total?Math.round(done/total*100):0};
}

function render(){
 const v=document.getElementById("view");
 if(detailEx){v.innerHTML=exercisePage(detailEx);}
 else if(detailDay){v.innerHTML=dayPage(detailDay);}
 else if(tab==="today"){v.innerHTML=todayView();}
 else if(tab==="week"){v.innerHTML=weekView();}
 else if(tab==="fuel"){v.innerHTML=fuelView();}
 else{v.innerHTML=historyView();}
 v.scrollTop=detailEx||detailDay?0:v.scrollTop;
 renderTabs();
}

/* ---- BACKUP / RESTORE ---- */
function exportBackup(){
 try{
   const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
   const url=URL.createObjectURL(blob);
   const a=document.createElement("a");
   a.href=url; a.download="recomp-backup-"+TODAY+".json";
   document.body.appendChild(a); a.click(); document.body.removeChild(a);
   setTimeout(()=>URL.revokeObjectURL(url),1500);
 }catch(e){ alert("Couldn't export the backup: "+e); }
}
function entryScore(e){
 let n=0;
 if(e.checks) n+=Object.values(e.checks).filter(Boolean).length;
 if(e.protein) n++; if(e.walk) n++;
 n+=(e.protg?1:0)+(e.carbg?1:0)+(e.sugarg?1:0);
 return n;
}
function importBackup(file){
 const reader=new FileReader();
 reader.onload=async()=>{
   try{
     const obj=JSON.parse(reader.result);
     if(!obj||typeof obj!=="object"||!obj.log){ alert("That doesn't look like a Recomp backup file."); return; }
     if(!confirm("Restore this backup? It merges into your current history, keeping the fullest record for each day.")) return;
     const cur=state.log||{};
     for(const k in obj.log){
       if(!cur[k] || entryScore(obj.log[k])>=entryScore(cur[k])) cur[k]=obj.log[k];
     }
     state.log=cur;
     await persist(); render();
     alert("Backup restored 🎉");
   }catch(e){ alert("Couldn't read that file — is it the backup .json? "+e); }
 };
 reader.readAsText(file);
}

 }

 // backup / restore — protects your history from a browser clear or device switch

/* ---------- event handling (delegated once — reliable on mobile) ---------- */
function setupEvents(){
 const app=document.getElementById("app");
 app.addEventListener("click", async (ev)=>{
   const t=ev.target; let el;
   if(el=t.closest("[data-tab]")){ tab=el.dataset.tab; detailDay=null; detailEx=null; render(); return; }
   if(el=t.closest("[data-back]")){ if(el.dataset.back==="ex"){detailEx=null;}else{detailDay=null;} render(); return; }
   if(el=t.closest("[data-set]")){ const p=el.dataset.set.split("|"), x=p[0], i=+p[1], e=entry(TODAY);
     const arr=getSetArr(e,x); arr[i]=!arr[i]; if(!e.checks)e.checks={}; e.checks[x]=arr;
     el.classList.toggle("on", arr[i]); persist(); return; }
   if(el=t.closest("[data-warm]")){ const i=+el.dataset.warm, e=entry(TODAY); if(!e.warm)e.warm={}; e.warm[i]=!e.warm[i]; persist();
     const row=el.closest(".exrow"); if(row) row.classList.toggle("on", !!e.warm[i]);
     afterTodayChange(); return; }
   if(el=t.closest("[data-water]")){ const amt=+el.dataset.water, e=entry(TODAY); if(!e.stk)e.stk={p:[],c:[],s:[],w:[]};
     e.water=Math.max(0,(e.water||0)+amt); if(amt>0)e.stk.w.push(amt); persist();
     if(refreshFuel()) return;
     const wr=document.getElementById("watrow"); if(wr){ wr.innerHTML=waterRow(e); return; }
     render(); return; }
   if(el=t.closest("[data-tog]")){ const k=el.dataset.tog, e=entry(TODAY); e[k]=!e[k]; persist();
     if(k==="protein"){ const r=document.getElementById("protrow"); if(r) r.innerHTML=proteinRow(e); }
     else if(k==="walk"){ const r=document.getElementById("walkrow"); if(r) r.innerHTML=walkRow(e); }
     afterTodayChange(); return; }
   if(el=t.closest("[data-seg]")){ fuelSeg=el.dataset.seg; render(); return; }
   if(el=t.closest("[data-food]")){ const f=FOODS[+el.dataset.food], e=entry(TODAY); if(!e.stk)e.stk={p:[],c:[],s:[],w:[]};
     if(f[2]>0){e.protg=(e.protg||0)+f[2]; e.stk.p.push(f[2]);}
     if(f[3]>0){e.carbg=(e.carbg||0)+f[3]; e.stk.c.push(f[3]);}
     if(f[4]>0){e.sugarg=(e.sugarg||0)+f[4]; e.stk.s.push(f[4]);}
     if((e.protg||0)>=90)e.protein=true; persist(); refreshFuel(); return; }
   if(el=t.closest("[data-mundo]")){ const m=el.dataset.mundo, e=entry(TODAY), K={p:"protg",c:"carbg",s:"sugarg",w:"water"}[m];
     if(!e.stk)e.stk={p:[],c:[],s:[],w:[]};
     if(e.stk[m]&&e.stk[m].length){ e[K]=Math.max(0,(e[K]||0)-e.stk[m].pop()); }
     if(m==="p")e.protein=(e.protg||0)>=90; persist(); refreshFuel(); return; }
   if(el=t.closest("[data-mreset]")){ const m=el.dataset.mreset, e=entry(TODAY), K={p:"protg",c:"carbg",s:"sugarg",w:"water"}[m];
     e[K]=0; if(!e.stk)e.stk={p:[],c:[],s:[],w:[]}; e.stk[m]=[];
     if(m==="p")e.protein=false; persist(); refreshFuel(); return; }
   if(el=t.closest("[data-export]")){ exportBackup(); return; }
   if(el=t.closest("[data-swap]")){ showSwap=!showSwap; render(); return; }
   if(el=t.closest("[data-pick]")){ entry(TODAY).workout=el.dataset.pick; showSwap=false; await persist(); render(); return; }
   if(el=t.closest("[data-day]")){ detailDay=el.dataset.day; detailEx=null; render(); return; }
   if(el=t.closest("[data-ex]")){ detailEx=el.dataset.ex; render(); return; }
 });
 app.addEventListener("change", async (ev)=>{
   const t=ev.target; let el;
   if(el=t.closest("[data-weight]")){ state.weight=Math.min(200,Math.max(30,parseInt(el.value)||58)); persist(); if(!refreshFuel()) render(); return; }
   if(el=t.closest("[data-import]")){ const f=el.files&&el.files[0]; if(f) importBackup(f); el.value=""; return; }
 });
}

/* ---------- boot ---------- */
(async function(){
 const saved=await store.get();
 if(saved&&saved.log)state=saved;
 setupEvents();
 render();
})();
</script>
